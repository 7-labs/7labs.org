name: Deploy

on:
  workflow_run:
    workflows:
      - Validate
    types:
      - completed
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check out validated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --registry=https://registry.npmjs.org

      - name: Build OpenNext worker
        run: ./deploy.sh cf-build

      - name: Deploy Cloudflare Worker
        run: npx --no-install wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke production
        run: SITE_URL=https://7labs.org npm run smoke:prod
