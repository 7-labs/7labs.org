name: Validate

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --registry=https://registry.npmjs.org

      - name: Validate production build
        run: npm run validate:prod

  e2e:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --registry=https://registry.npmjs.org

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build OpenNext worker
        run: ./deploy.sh cf-build

      - name: Start OpenNext preview
        run: |
          npx --no-install opennextjs-cloudflare preview --port 3337 --ip 127.0.0.1 > /tmp/7labs-preview.log 2>&1 &
          echo $! > /tmp/7labs-preview.pid
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3337 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/7labs-preview.log
          exit 1

      - name: Run Playwright smoke
        run: E2E_BASE_URL=http://127.0.0.1:3337 npm run test:e2e

      - name: Stop OpenNext preview
        if: always()
        run: |
          if [ -f /tmp/7labs-preview.pid ]; then
            kill "$(cat /tmp/7labs-preview.pid)" >/dev/null 2>&1 || true
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
